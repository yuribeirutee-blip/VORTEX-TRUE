<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX TRUE LOJA</title>
    <style>
        /* Efeito de Vórtice Animado no Fundo */
        body {
            background-color: #06040a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Fundo animado simulando partículas de um vórtice */
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(138,43,226,0.15) 0%, rgba(0,0,0,0) 60%),
                        radial-gradient(circle, rgba(168,85,247,0.05) 0%, rgba(0,0,0,0) 40%);
            animation: vortexRotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes vortexRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 40px;
            margin-bottom: 40px;
            color: #fff;
            text-shadow: 0 0 15px #a855f7, 0 0 30px #a855f7;
            font-size: 2.5rem;
        }

        /* Grade que organiza os produtos */
        .container-produtos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px;
        }

        /* Estilo dos Cards */
        .card-produto {
            background: rgba(15, 10, 25, 0.85);
            border: 2px solid #2d1f4e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        /* Efeito Glow Roxo ao passar o mouse */
        .card-produto:hover {
            transform: translateY(-5px);
            border-color: #a855f7;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.7);
        }

        .titulo-produto {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #f3e8ff;
        }

        .preco {
            font-size: 1.6rem;
            color: #4ade80;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.2);
        }

        /* Botão de Compra */
        .btn-comprar {
            display: block;
            text-align: center;
            background: #1e1135;
            color: #fff;
            text-decoration: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
            border: 2px solid #581c87;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .btn-comprar:hover {
            background: #a855f7;
            border-color: #c084fc;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        /* JANELA FLUTUANTE (MODAL PAGAMENTO) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 999; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        .modal-conteudo {
            background-color: #0f0b1e;
            border: 2px solid #a855f7;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            animation: abrirModal 0.3s ease-out;
        }

        @keyframes abrirModal {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .fechar-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #a855f7;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .fechar-modal:hover {
            color: #f3e8ff;
        }

        .modal h2 {
            margin-top: 0;
            text-transform: uppercase;
            color: #4ade80;
            font-size: 1.5rem;
        }

        .qrcode-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            margin: 20px 0;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .qrcode-container img {
            display: block;
            width: 200px;
            height: 200px;
        }

        .pix-copia {
            background: #18122b;
            border: 1px solid #3b2d63;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            word-break: break-all;
            margin-bottom: 15px;
            color: #c084fc;
        }

        .btn-copiar {
            background: #4ade80;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-copiar:hover {
            background: #22c55e;
        }
    </style>
</head>
<body>

    <h1>VORTEX TRUE LOJA</h1>

    <div class="container-produtos">

        <!-- PRODUTO 1 -->
        <div class="card-produto">
            <div>
                <p class="titulo-produto">Otimização</p>
                <div class="preco">R$ 5,00</div>
            </div>
            <button class="btn-comprar" onclick="abrirPagamento('Otimização', '5.00')">Comprar</button>
        </div>

        <!-- PRODUTO 2 -->
        <div class="card-produto">
            <div>
                <p class="titulo-produto">Pack Sensi</p>
                <div class="preco">R$ 3,00</div>
            </div>
            <button class="btn-comprar" onclick="abrirPagamento('Pack Sensi', '3.00')">Comprar</button>
        </div>

        <!-- PRODUTO 3 -->
        <div class="card-produto">
            <div>
                <p class="titulo-produto">Tds as camisas de time da loja</p>
                <div class="preco">R$ 3,00</div>
            </div>
            <button class="btn-comprar" onclick="abrirPagamento('Tds as camisas de time da loja', '3.00')">Comprar</button>
        </div>

    </div>

    <!-- JANELA FLUTUANTE DE PAGAMENTO -->
    <div id="janelaPix" class="modal">
        <div class="modal-conteudo">
            <span class="fechar-modal" onclick="fecharPagamento()">&times;</span>
            <h2 id="modalTitulo">Pagamento</h2>
            <p>Escaneie o QR Code abaixo para pagar <strong><span id="modalPreco">R$ 0,00</span></strong>:</p>
            
            <div class="qrcode-container">
                <!-- Gera dinamicamente o QR Code com a sua chave Pix -->
                <img id="qrcodeImg" src="" alt="QR Code Pix">
            </div>

            <p style="font-size: 0.9rem; color: #a1a1aa; margin-bottom: 5px;">Chave Pix Copia e Cola:</p>
            <div class="pix-copia" id="chavePixTexto">2b1ac183-bc55-472b-ac67-2167a3d82d37</div>
            <button class="btn-copiar" onclick="copiarChave()">Copiar Chave Pix</button>
        </div>
    </div>

    <script>
        const minhaChavePix = "2b1ac183-bc55-472b-ac67-2167a3d82d37";

        function abrirPagamento(nomeProduto, valor) {
            document.getElementById('modalTitulo').innerText = nomeProduto;
            document.getElementById('modalPreco').innerText = "R$ " + valor.replace('.', ',');
            
            // API pública para gerar a imagem do QR Code baseado na sua chave Pix e valor
            const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=00020101021126580014br.gov.bcb.pix0136${minhaChavePix}5204000053039865404${valor}5802BR5915VortexTrueLoja6009SaoPaulo62070503***6304`;
            
            document.getElementById('qrcodeImg').src = qrCodeUrl;
            document.getElementById('janelaPix').style.display = 'flex';
        }

        function fecharPagamento() {
            document.getElementById('janelaPix').style.display = 'none';
        }

        function copiarChave() {
            navigator.clipboard.writeText(minhaChavePix);
            alert("Chave Pix copiada com sucesso! Só colar no seu banco.");
        }

        // Fecha a janela se clicar fora do quadrado do conteúdo
        window.onclick = function(event) {
            const modal = document.getElementById('janelaPix');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
