<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja de Sensi & Otimização</title>
    <style>
        /* Configurações Gerais do Fundo */
        body {
            background-color: #0b0813; /* Roxo bem escuro */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            /* Se quiser colocar uma imagem de fundo igual à do site, descomente a linha abaixo: */
            /* background-image: url('sua-imagem-de-fundo.jpg'); */
            background-size: cover;
            background-attachment: fixed;
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #fff;
            text-shadow: 0 0 10px #8a2be2;
        }

        /* Grade que organiza os produtos */
        .container-produtos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Estilo de cada Card (Produto) */
        .card-produto {
            background: rgba(20, 16, 31, 0.85); /* Fundo escuro semi-transparente */
            border: 1px solid #2d1f4e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Efeito de Brilho (Glow) ao passar o mouse */
        .card-produto:hover {
            transform: translateY(-5px);
            border-color: #a855f7; /* Roxo neon */
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
        }

        /* Card Destaque (Igual o amarelo da imagem) */
        .card-produto.destaque {
            border-color: #eab308; /* Amarelo/Dourado */
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.4);
        }
        .card-produto.destaque:hover {
            box-shadow: 0 0 25px rgba(234, 179, 8, 0.8);
        }

        /* Imagem do Produto */
        .card-produto img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        /* Detalhes do Texto */
        .info-produto {
            padding: 15px;
        }

        .titulo-produto {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .preco {
            font-size: 1.3rem;
            color: #4ade80; /* Verde para o preço */
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Botão de Compra/Acesso */
        .btn-comprar {
            display: block;
            text-align: center;
            background: #221a36;
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.2s;
            border: 1px solid #3b2d5c;
        }

        .btn-comprar:hover {
            background: #a855f7;
            border-color: #a855f7;
        }

        .destaque .btn-comprar:hover {
            background: #eab308;
            color: #000;
            border-color: #eab308;
        }
    </style>
</head>
<body>

    <h1>Tudo que você precisa para o seu Jogo</h1>

    <div class="container-produtos">

        <!-- PRODUTO 1 (DESTAQUE AMARELO) -->
        <div class="card-produto destaque">
            <img src="https://via.placeholder.com/300x180" alt="Capa do Produto">
            <div class="info-produto">
                <p class="titulo-produto">Combo Sensi VIP + Otimização FPS</p>
                <div class="preco">R$ 29,90</div>
                <a href="SEU_LINK_DE_PAGAMENTO_OU_WHATSAPP" class="btn-comprar">Comprar</a>
            </div>
        </div>

        <!-- PRODUTO 2 (ROXO PADRÃO) -->
        <div class="card-produto">
            <img src="https://via.placeholder.com/300x180" alt="Capa do Produto">
            <div class="info-produto">
                <p class="titulo-produto">Pack de Regedit Mobile</p>
                <div class="preco">R$ 14,90</div>
                <a href="#" class="btn-comprar">Comprar</a>
            </div>
        </div>

        <!-- PRODUTO 3 (ROXO PADRÃO) -->
        <div class="card-produto">
            <img src="https://via.placeholder.com/300x180" alt="Capa do Produto">
            <div class="info-produto">
                <p class="titulo-produto">Ajustes Avançados Emulador</p>
                <div class="preco">R$ 19,90</div>
                <a href="#" class="btn-comprar">Comprar</a>
            </div>
        </div>

    </div>

</body>
